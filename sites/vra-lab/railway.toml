[build]
buildCommand = "pnpm install --ignore-scripts && pnpm --filter @agent-tale/core build && pnpm --filter @agent-tale/astro-integration build && pnpm --filter @agent-tale/analytic build && pnpm --filter @agent-tale/vra-lab build"

[deploy]
startCommand = "node sites/vra-lab/dist/server/entry.mjs"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
