<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- VRA-Lab — Constellation over Earth -->

  <style>
    @keyframes globe-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes node-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
    .globe-rings {
      transform-origin: 0px 0px;
      animation: globe-spin 24s linear infinite;
    }
    .node-outer { animation: node-pulse 3s ease-in-out infinite; }
    .node-outer:nth-child(1) { animation-delay: 0s; }
    .node-outer:nth-child(2) { animation-delay: 0.5s; }
    .node-outer:nth-child(3) { animation-delay: 1s; }
    .node-outer:nth-child(4) { animation-delay: 1.5s; }
    .node-outer:nth-child(5) { animation-delay: 2s; }
    .node-outer:nth-child(6) { animation-delay: 2.5s; }
    .node-outer:nth-child(7) { animation-delay: 0.8s; }
    @media (prefers-reduced-motion: reduce) {
      .globe-rings, .node-outer { animation: none; }
    }
  </style>

  <g transform="translate(100, 100)">
    <!-- Earth circle (back layer) -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#b8a88a" stroke-width="1.2" opacity="0.35"/>

    <!-- Spinning globe rings -->
    <g class="globe-rings">
      <ellipse cx="0" cy="0" rx="75" ry="20" fill="none" stroke="#b8a88a" stroke-width="0.6" opacity="0.15"/>
      <ellipse cx="0" cy="0" rx="20" ry="75" fill="none" stroke="#b8a88a" stroke-width="0.6" opacity="0.15"/>
    </g>

    <!-- V arms -->
    <line x1="0" y1="-72" x2="-68" y2="62" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>
    <line x1="0" y1="-72" x2="68" y2="62" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>

    <!-- Spine -->
    <line x1="0" y1="-72" x2="0" y2="62" stroke="#d4c8b0" stroke-width="1.3" opacity="0.45"/>

    <!-- R bump -->
    <line x1="0" y1="-20" x2="40" y2="-20" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>
    <line x1="40" y1="-20" x2="40" y2="8" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>
    <line x1="40" y1="8" x2="0" y2="8" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>

    <!-- R leg -->
    <line x1="40" y1="8" x2="58" y2="45" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>

    <!-- Nodes -->
    <g class="node-outer"><circle cx="0" cy="-72" r="6.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.6"/><circle cx="0" cy="-72" r="3" fill="#d4c8b0"/></g>
    <g class="node-outer"><circle cx="-68" cy="62" r="5.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.4"/><circle cx="-68" cy="62" r="2.5" fill="#d4c8b0"/></g>
    <g class="node-outer"><circle cx="68" cy="62" r="5.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.4"/><circle cx="68" cy="62" r="2.5" fill="#d4c8b0"/></g>
    <g class="node-outer"><circle cx="0" cy="62" r="5.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.4"/><circle cx="0" cy="62" r="2.5" fill="#d4c8b0"/></g>
    <g class="node-outer"><circle cx="40" cy="-20" r="5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.3"/><circle cx="40" cy="-20" r="2.2" fill="#d4c8b0"/></g>
    <g class="node-outer"><circle cx="40" cy="8" r="5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.3"/><circle cx="40" cy="8" r="2.2" fill="#d4c8b0"/></g>
    <g class="node-outer"><circle cx="58" cy="45" r="5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.3"/><circle cx="58" cy="45" r="2.2" fill="#d4c8b0"/></g>
  </g>
</svg>
