<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 50" width="260" height="50">
  <!-- VRA Lab — Nav bar horizontal logo -->
  <!-- Background: transparent. Designed for dark bg #2a2a24 -->

  <g transform="translate(25, 25) scale(0.16)">
    <!-- Spine -->
    <line x1="0" y1="-75" x2="0" y2="68" stroke="#d4c8b0" stroke-width="2" opacity="0.5"/>
    <!-- V arms -->
    <line x1="0" y1="-75" x2="-80" y2="68" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-75" x2="80" y2="68" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>
    <!-- R bump -->
    <line x1="0" y1="-35" x2="44" y2="-35" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>
    <line x1="44" y1="-35" x2="49" y2="-17" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>
    <line x1="49" y1="-17" x2="35" y2="-2" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>
    <line x1="35" y1="-2" x2="0" y2="-2" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>
    <!-- R leg -->
    <line x1="35" y1="-2" x2="60" y2="48" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>
    <!-- Cross links -->
    <line x1="-80" y1="68" x2="0" y2="68" stroke="#b8a88a" stroke-width="1" opacity="0.18"/>
    <line x1="0" y1="68" x2="60" y2="48" stroke="#b8a88a" stroke-width="1" opacity="0.18"/>
    <!-- Nodes -->
    <circle cx="0" cy="-75" r="11" fill="#2a2a24" stroke="#d4c8b0" stroke-width="3"/><circle cx="0" cy="-75" r="5" fill="#d4c8b0"/>
    <circle cx="-80" cy="68" r="9" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2.5"/><circle cx="-80" cy="68" r="4" fill="#d4c8b0"/>
    <circle cx="80" cy="68" r="9" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2.5"/><circle cx="80" cy="68" r="4" fill="#d4c8b0"/>
    <circle cx="0" cy="68" r="9" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2.5"/><circle cx="0" cy="68" r="4" fill="#d4c8b0"/>
    <circle cx="0" cy="-35" r="7" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2"/><circle cx="0" cy="-35" r="3" fill="#d4c8b0"/>
    <circle cx="44" cy="-35" r="8" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2"/><circle cx="44" cy="-35" r="3.5" fill="#d4c8b0"/>
    <circle cx="49" cy="-17" r="7" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2"/><circle cx="49" cy="-17" r="3" fill="#d4c8b0"/>
    <circle cx="35" cy="-2" r="7" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2"/><circle cx="35" cy="-2" r="3" fill="#d4c8b0"/>
    <circle cx="0" cy="-2" r="6" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.8"/><circle cx="0" cy="-2" r="2.5" fill="#d4c8b0"/>
    <circle cx="60" cy="48" r="8" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2"/><circle cx="60" cy="48" r="3.5" fill="#d4c8b0"/>
  </g>

  <!-- Wordmark -->
  <text x="55" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#d4c8b0" letter-spacing="1.5">VRA Lab</text>
</svg>
