<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- VRA Lab — Icon only (favicon / nav) -->
  <!-- Background: transparent. Designed for dark bg #2a2a24 -->

  <!-- Faint stars -->
  <circle cx="20" cy="30" r="1" fill="#b8a88a" opacity="0.2"/>
  <circle cx="178" cy="25" r="0.8" fill="#b8a88a" opacity="0.16"/>
  <circle cx="15" cy="150" r="0.7" fill="#b8a88a" opacity="0.13"/>
  <circle cx="185" cy="140" r="0.9" fill="#b8a88a" opacity="0.15"/>
  <circle cx="100" cy="10" r="0.8" fill="#b8a88a" opacity="0.12"/>

  <g transform="translate(100, 100)">
    <!-- Spine -->
    <line x1="0" y1="-75" x2="0" y2="68" stroke="#d4c8b0" stroke-width="1.5" opacity="0.5"/>

    <!-- V arms -->
    <line x1="0" y1="-75" x2="-80" y2="68" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>
    <line x1="0" y1="-75" x2="80" y2="68" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>

    <!-- R bump -->
    <line x1="0" y1="-35" x2="44" y2="-35" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>
    <line x1="44" y1="-35" x2="49" y2="-17" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>
    <line x1="49" y1="-17" x2="35" y2="-2" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>
    <line x1="35" y1="-2" x2="0" y2="-2" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>

    <!-- R leg -->
    <line x1="35" y1="-2" x2="60" y2="48" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>

    <!-- Cross links -->
    <line x1="-80" y1="68" x2="0" y2="68" stroke="#b8a88a" stroke-width="0.6" opacity="0.18"/>
    <line x1="0" y1="68" x2="60" y2="48" stroke="#b8a88a" stroke-width="0.6" opacity="0.18"/>
    <line x1="80" y1="68" x2="60" y2="48" stroke="#b8a88a" stroke-width="0.6" opacity="0.15"/>

    <!-- Nodes -->
    <circle cx="0" cy="-75" r="7" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.8"/><circle cx="0" cy="-75" r="3.2" fill="#d4c8b0"/>
    <circle cx="-80" cy="68" r="6" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.5"/><circle cx="-80" cy="68" r="2.8" fill="#d4c8b0"/>
    <circle cx="80" cy="68" r="6" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.5"/><circle cx="80" cy="68" r="2.8" fill="#d4c8b0"/>
    <circle cx="0" cy="68" r="6" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.5"/><circle cx="0" cy="68" r="2.8" fill="#d4c8b0"/>
    <circle cx="0" cy="-35" r="4.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.2"/><circle cx="0" cy="-35" r="2" fill="#d4c8b0"/>
    <circle cx="44" cy="-35" r="5.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.4"/><circle cx="44" cy="-35" r="2.4" fill="#d4c8b0"/>
    <circle cx="49" cy="-17" r="4.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.2"/><circle cx="49" cy="-17" r="2" fill="#d4c8b0"/>
    <circle cx="35" cy="-2" r="4.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.2"/><circle cx="35" cy="-2" r="2" fill="#d4c8b0"/>
    <circle cx="0" cy="-2" r="4" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.1"/><circle cx="0" cy="-2" r="1.8" fill="#d4c8b0"/>
    <circle cx="60" cy="48" r="5.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.4"/><circle cx="60" cy="48" r="2.4" fill="#d4c8b0"/>
  </g>
</svg>
