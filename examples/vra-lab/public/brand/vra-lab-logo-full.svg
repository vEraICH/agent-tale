<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 480" width="440" height="480">
  <!-- VRA Lab — Full logo with wordmark -->
  <!-- Background: transparent. Designed for dark bg #2a2a24 -->

  <!-- Faint background stars -->
  <circle cx="50" cy="80" r="1.2" fill="#b8a88a" opacity="0.2"/>
  <circle cx="345" cy="60" r="1" fill="#b8a88a" opacity="0.18"/>
  <circle cx="30" cy="250" r="0.9" fill="#b8a88a" opacity="0.15"/>
  <circle cx="370" cy="230" r="1" fill="#b8a88a" opacity="0.17"/>
  <circle cx="200" cy="20" r="0.9" fill="#b8a88a" opacity="0.14"/>
  <circle cx="100" cy="310" r="0.8" fill="#b8a88a" opacity="0.12"/>
  <circle cx="320" cy="295" r="0.9" fill="#b8a88a" opacity="0.13"/>
  <circle cx="155" cy="50" r="0.7" fill="#b8a88a" opacity="0.11"/>
  <circle cx="270" cy="40" r="0.8" fill="#b8a88a" opacity="0.13"/>

  <g transform="translate(220, 190)">
    <!-- Shared vertical spine (brighter) -->
    <line x1="0" y1="-110" x2="0" y2="100" stroke="#d4c8b0" stroke-width="1.5" opacity="0.5"/>

    <!-- V arms -->
    <line x1="0" y1="-110" x2="-120" y2="100" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>
    <line x1="0" y1="-110" x2="120" y2="100" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>

    <!-- R bump -->
    <line x1="0" y1="-55" x2="65" y2="-55" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>
    <line x1="65" y1="-55" x2="72" y2="-28" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>
    <line x1="72" y1="-28" x2="52" y2="-5" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>
    <line x1="52" y1="-5" x2="0" y2="-5" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>

    <!-- R leg -->
    <line x1="52" y1="-5" x2="90" y2="70" stroke="#b8a88a" stroke-width="1.3" opacity="0.5"/>

    <!-- Subtle cross links (knowledge graph feel) -->
    <line x1="-120" y1="100" x2="0" y2="100" stroke="#b8a88a" stroke-width="0.6" opacity="0.18"/>
    <line x1="0" y1="100" x2="90" y2="70" stroke="#b8a88a" stroke-width="0.6" opacity="0.18"/>
    <line x1="120" y1="100" x2="90" y2="70" stroke="#b8a88a" stroke-width="0.6" opacity="0.15"/>
    <line x1="72" y1="-28" x2="120" y2="100" stroke="#b8a88a" stroke-width="0.5" opacity="0.12"/>

    <!-- === Star nodes (ring + dot style) === -->
    <!-- Top (apex — largest) -->
    <circle cx="0" cy="-110" r="9" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.8"/>
    <circle cx="0" cy="-110" r="4" fill="#d4c8b0"/>

    <!-- V bottom-left -->
    <circle cx="-120" cy="100" r="8" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.5"/>
    <circle cx="-120" cy="100" r="3.5" fill="#d4c8b0"/>

    <!-- V bottom-right -->
    <circle cx="120" cy="100" r="8" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.5"/>
    <circle cx="120" cy="100" r="3.5" fill="#d4c8b0"/>

    <!-- Spine bottom -->
    <circle cx="0" cy="100" r="8" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.5"/>
    <circle cx="0" cy="100" r="3.5" fill="#d4c8b0"/>

    <!-- Spine mid (R junction) -->
    <circle cx="0" cy="-55" r="6" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.3"/>
    <circle cx="0" cy="-55" r="2.5" fill="#d4c8b0"/>

    <!-- R bump top -->
    <circle cx="65" cy="-55" r="7" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.5"/>
    <circle cx="65" cy="-55" r="3" fill="#d4c8b0"/>

    <!-- R bump curve -->
    <circle cx="72" cy="-28" r="6" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.3"/>
    <circle cx="72" cy="-28" r="2.5" fill="#d4c8b0"/>

    <!-- R bump return -->
    <circle cx="52" cy="-5" r="6" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.3"/>
    <circle cx="52" cy="-5" r="2.5" fill="#d4c8b0"/>

    <!-- Spine mid-low (R crossbar) -->
    <circle cx="0" cy="-5" r="5.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.2"/>
    <circle cx="0" cy="-5" r="2.2" fill="#d4c8b0"/>

    <!-- R leg end -->
    <circle cx="90" cy="70" r="7" fill="#2a2a24" stroke="#d4c8b0" stroke-width="1.5"/>
    <circle cx="90" cy="70" r="3" fill="#d4c8b0"/>
  </g>

  <!-- Wordmark -->
  <text x="220" y="370" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="#d4c8b0" letter-spacing="3">VRA Lab</text>

  <!-- Tagline -->
  <text x="220" y="400" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#b8a88a" letter-spacing="3">CRAFTED BY HUMAN, HANDED BY AGENT</text>
</svg>
