<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <g transform="translate(25, 25) scale(0.16)">
    <!-- Earth circle -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#b8a88a" stroke-width="2" opacity="0.35"/>
    <ellipse cx="0" cy="0" rx="75" ry="20" fill="none" stroke="#b8a88a" stroke-width="1" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="20" ry="75" fill="none" stroke="#b8a88a" stroke-width="1" opacity="0.15"/>

    <!-- V arms -->
    <line x1="0" y1="-72" x2="-68" y2="62" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-72" x2="68" y2="62" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>

    <!-- Spine -->
    <line x1="0" y1="-72" x2="0" y2="62" stroke="#d4c8b0" stroke-width="2" opacity="0.45"/>

    <!-- R bump -->
    <line x1="0" y1="-20" x2="40" y2="-20" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>
    <line x1="40" y1="-20" x2="40" y2="8" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>
    <line x1="40" y1="8" x2="0" y2="8" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>

    <!-- R leg -->
    <line x1="40" y1="8" x2="58" y2="45" stroke="#b8a88a" stroke-width="2" opacity="0.5"/>

    <!-- Nodes -->
    <circle cx="0" cy="-72" r="10" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2.8"/><circle cx="0" cy="-72" r="4.5" fill="#d4c8b0"/>
    <circle cx="-68" cy="62" r="8.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2.5"/><circle cx="-68" cy="62" r="3.8" fill="#d4c8b0"/>
    <circle cx="68" cy="62" r="8.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2.5"/><circle cx="68" cy="62" r="3.8" fill="#d4c8b0"/>
    <circle cx="0" cy="62" r="8.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2.5"/><circle cx="0" cy="62" r="3.8" fill="#d4c8b0"/>
    <circle cx="40" cy="-20" r="7.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2"/><circle cx="40" cy="-20" r="3.2" fill="#d4c8b0"/>
    <circle cx="40" cy="8" r="7.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2"/><circle cx="40" cy="8" r="3.2" fill="#d4c8b0"/>
    <circle cx="58" cy="45" r="7.5" fill="#2a2a24" stroke="#d4c8b0" stroke-width="2"/><circle cx="58" cy="45" r="3.2" fill="#d4c8b0"/>
